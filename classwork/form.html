<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Forms</title>
</head>

<body>
    <!-- Form for collecting user information -->
    <form>
        <p>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" />
        </p>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" />
        </p>
        <p>
            <label for="message">Message:</label>
            <textarea rows="4" cols="50" id="message" placeholder="Enter your message"></textarea>
        </p>
        <p>
            <label for="color">Choose a color:</label>
            <input type="color" id="color" />
        </p>
        <p>
            <label for="skills">Skills:</label>
            <input type="checkbox" id="skills" />
            <label for="skills">JavaScript</label>
            <input type="checkbox" id="skills2" />
            <label for="skills2">Python</label>
            <input type="checkbox" id="skills3" />
            <label for="skills3">Java</label>
        </p>
        <p>
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter your password" />
        </p>
        <!-- <input type="submit" value="Pay Now!" /> -->
        <button type="submit">Pay Now!</button>
        </p>
    </form>
</body>

</html>
