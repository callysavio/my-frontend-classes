<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        .man {
        --color-clifford: #da373d;
      }
    </style>
    <title>Introduction to CSS</title>
</head>

<body>
    <p class="text-red-450 text-3xl font-bold underline text-center ">I am a Paragraph</p>
    <p>I am a Paragraph</p>
    <p>I am a Paragraph</p>
    <p>I am a Paragraph</p>
    <p>I am a Paragraph</p>
    <p>I am a Paragraph</p>

    <div id="my-div">
        <p>I am the Parent of the P element</p>
        <p>I am the first Child of The Div Element</p>
        <p>I am the second Child of The Div Element</p>
    </div>

    <input type="text" placeholder="Enter your name">
    <style>
        #my-div {
            background-color: #da373d;
            cursor: pointer;
        }

        #my-div:hover {
            background-color: transparent;
        }

        #my-div p {
            background-color: inherit;
        }
    </style>
</body>

</html>
