<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Data Management</title>
</head>

<body>
    <div id="msg"></div>
    <form>
        <p><input id="name" type="text" placeholder="Your name" /></p>
        <p><input id="email" type="email" placeholder="Your email" /></p>
        <p><input id="age" type="number" placeholder="Your age" /></p>
        <p>
            Gender
            <input type="radio" value="Male" name="gender" class="gender" />Male
            <input type="radio" value="Female" name="gender" class="gender" />Female
        </p>
        <button type="submit">Submit</button>
    </form>

    <div id="users-data">

    </div>
    <script src="./user-data.js"></script>
</body>

</html>
