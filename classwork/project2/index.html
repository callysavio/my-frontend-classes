<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <title>Registration Form</title>
</head>

<body>
    <div id="register-section">
        <h2>Register</h2>
        <form id="registerForm">
            <label>Full Name:</label>
            <input type="text" id="fullName" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Username:</label>
            <input type="text" id="username" required>

            <label>Password:</label>
            <input type="password" id="password" required>

            <!-- Password Rules Checklist -->
            <ul id="passwordRules">
                <li id="ruleLength">✖ Minimum 8 characters</li>
                <li id="ruleUpper">✖ At least one uppercase letter</li>
                <li id="ruleLower">✖ At least one lowercase letter</li>
                <li id="ruleNumber">✖ At least one number</li>
                <li id="ruleSpecial">✖ At least one special character (!@#$%)</li>
            </ul>

            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword" required>
            <small id="confirmMessage"></small>

            <button type="submit">Register</button>
        </form>
        <p id="registerMessage"></p>
    </div>

    <script src="./index.js"></script>
</body>

</html>
