<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>
    <table border="1" width="600" cellspacing="4" cellpadding="5" align="center">
        <caption>
            <h2>Student Marks</h2>
        </caption>
        <tr align="left">
            <th>Serial No.</th>
            <th>Name</th>
            <th>First Test</th>
            <th>Second Test</th>
            <th>Exam</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Callistus Anwara</td>
            <td>85</td>
            <td>90</td>
            <td>92</td>
            <td>267</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Agnes Anwara</td>
            <td>78</td>
            <td>82</td>
            <td>88</td>
            <td>248</td>
        </tr>
    </table>
</body>

</html>
